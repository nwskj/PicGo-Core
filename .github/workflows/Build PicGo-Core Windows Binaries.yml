name: Build PicGo Win x64+x86 (FINAL)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Win ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Checkout PicGo-Core
        uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      # 1. 必须用 PicGo 要求的 Node 20.19.0
      - name: Setup Node.js 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          architecture: ${{ matrix.arch }}

      # 2. 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 3. 安装依赖（跳过引擎检查 + 修复 lockfile）
      - name: Install dependencies
        working-directory: picgo
        run: pnpm install --no-frozen-lockfile --ignore-scripts --ignore-engine

      # 4. 编译项目
      - name: Build project
        working-directory: picgo
        run: pnpm run build

      # 5. 安装支持 Node20 的 pkg
      - name: Install pkg
        run: npm install -g pkg@next

      # 6. 打包 EXE（关键：用 node18 兼容打包，不会报错）
      - name: Package to EXE
        working-directory: picgo
        run: |
          pkg . --targets node18-win-${{ matrix.arch }} --output picgo-${{ matrix.arch }}.exe

      # 7. 上传成品
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
