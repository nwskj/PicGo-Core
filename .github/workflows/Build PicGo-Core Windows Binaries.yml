name: Build PicGo-Core Win64 + x86 (Node20.19.0)
on:
  workflow_dispatch:  # 手动触发（推荐）
  push:
    branches: [master]

jobs:
  build:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      # 1. 拉取 PicGo 官方最新代码
      - name: Checkout PicGo-Core
        uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      # 2. 安装【PicGo 强制要求的固定版本】Node.js 20.19.0
      - name: Setup Node.js 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0  # 严格匹配官方要求
          architecture: ${{ matrix.arch }}

      # 3. 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. 安装依赖
      - name: Install dependencies
        working-directory: picgo
        run: pnpm install --frozen-lockfile

      # 5. 编译 TS 源码
      - name: Build PicGo
        working-directory: picgo
        run: pnpm run build

      # 6. 安装支持 Node20 的 pkg
      - name: Install pkg
        run: npm install -g pkg@latest

      # 7. 打包 EXE（严格匹配 Node20 + 架构）
      - name: Package to EXE
        working-directory: picgo
        run: |
          pkg . --targets node20-win-${{ matrix.arch }} --output picgo-${{ matrix.arch }}.exe

      # 8. 上传编译好的 exe
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
