name: Auto Compile (Win/Armbian)
on:
  # 1. 每20天触发（UTC时间每月1日、21日，覆盖20天间隔）
  schedule:
    - cron: '0 0 1,21 * *'
  # 2. 手动触发（方便测试）
  workflow_dispatch:

# 并发控制：避免重复编译
concurrency:
  group: ${{ github.ref }}-auto-compile
  cancel-in-progress: true

jobs:
  # 任务1：Windows系统编译
  compile-windows:
    runs-on: windows-latest  # GitHub托管的Windows运行器
    # 轻量化配置：禁用不必要的功能
    env:
      GIT_TERMINAL_PROMPT: 0  # 禁用git交互提示
    steps:
      - name: 拉取代码（轻量化克隆，仅最新提交）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 仅拉取最新提交，减少耗时和磁盘占用

      - name: 执行编译（Windows）
        shell: pwsh
        run: |
          # 替换为你的Windows编译命令（示例：make/msbuild等）
          cd ${{ github.workspace }}
          make clean 2>&1 || echo "Clean skipped (no makefile)"
          make 2>&1

      - name: 输出编译日志（可选，轻量化可注释）
        if: always()
        run: |
          Get-Content ./compile.log -ErrorAction SilentlyContinue

  # 任务2：Armbian系统编译
  compile-armbian:
    runs-on: [self-hosted, armbian]  # 匹配Armbian自托管Runner的标签
    env:
      GIT_TERMINAL_PROMPT: 0
    steps:
      - name: 拉取代码（轻量化克隆）
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 执行编译（Armbian）
        shell: bash
        run: |
          # 替换为你的Armbian编译命令（示例：make）
          cd ${{ github.workspace }}
          make clean 2>&1 || echo "Clean skipped (no makefile)"
          make 2>&1

      - name: 输出编译日志（可选）
        if: always()
        run: |
          cat ./compile.log 2>/dev/null || echo "No log file"
