name: Build PicGo-Core Windows (x64+x86)
on:
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [master]

jobs:
  build:
    name: Build Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Checkout PicGo-Core latest
        uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      # 安装 Node 20
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.arch }}

      # 安装 pnpm（修复你遇到的错误）
      - name: Install pnpm
        run: npm install -g pnpm

      # 安装依赖
      - name: Install dependencies
        working-directory: picgo
        run: pnpm install --frozen-lockfile

      # 编译 TS
      - name: Build
        working-directory: picgo
        run: pnpm run build

      # 打包成 exe
      - name: Package to EXE
        working-directory: picgo
        run: |
          npm install -g pkg
          pkg . --targets node20-${{ matrix.arch }}-win --output picgo-${{ matrix.arch }}.exe

      # 上传成品
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
