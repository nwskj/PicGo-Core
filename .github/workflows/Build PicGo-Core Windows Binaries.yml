name: Build PicGo Win x64+x86 (FINAL)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Win ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Checkout PicGo-Core
        uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      - name: Setup Node.js 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        working-directory: picgo
        run: npm install

      - name: Build project
        working-directory: picgo
        run: npm run build

      # ======================================================================
      # 关键修复：创建 pkg 配置，强制打包所有依赖（解决 fflate 缺失）
      # ======================================================================
      - name: Create pkg config
        working-directory: picgo
        run: |
          echo '{
            "main": "./dist/index.cjs.js",
            "bin": "./dist/index.cjs.js",
            "pkg": {
              "assets": [
                "node_modules/**/*",
                "dist/**/*"
              ]
            }
          }' > package-pkg.json

      # ======================================================================
      # 关键修复：用支持 Node20 的新一代打包工具 @yao-pkg/pkg
      # ======================================================================
      - name: Install yao-pkg (fixed pkg)
        run: npm install -g @yao-pkg/pkg@latest

      # ======================================================================
      # 关键修复：正确打包，不再丢文件
      # ======================================================================
      - name: Package to EXE
        working-directory: picgo
        run: |
          pkg package-pkg.json --targets node20-win-${{ matrix.arch }} --output picgo-${{ matrix.arch }}.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
