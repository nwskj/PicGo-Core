name: Build PicGo Win x64+x86 (Fixed)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Win ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - name: Checkout PicGo-Core
        uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      # 固定用 Node 16.15.1 (pkg 5.x 唯一支持的版本)
      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16.15.1
          architecture: ${{ matrix.arch }}

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        working-directory: picgo
        run: pnpm install --frozen-lockfile

      - name: Build project
        working-directory: picgo
        run: pnpm run build

      # 关键：pkg 必须用 5.8.1，只支持 node16
      - name: Install pkg 5.8.1
        run: npm install -g pkg@5.8.1

      # 打包命令：node16 不是 node20！
      - name: Package EXE
        working-directory: picgo
        run: |
          pkg . --targets node16-win-${{ matrix.arch }} --output picgo-${{ matrix.arch }}.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
