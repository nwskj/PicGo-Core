name: Build PicGo Win x64+x86 (REAL FINAL)
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Win ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      - uses: actions/checkout@v4
        with:
          repository: PicGo/PicGo-Core
          ref: master
          path: picgo

      - name: Use Node.js 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          architecture: ${{ matrix.arch }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: picgo
        run: pnpm install --ignore-engines

      - name: Build
        working-directory: picgo
        run: pnpm run build

      # 关键：正确入口 + 强制打包所有依赖，不丢文件
      - name: Write pkg config
        working-directory: picgo
        run: |
          echo '{
            "main": "./dist/index.cjs.js",
            "bin": "./dist/index.cjs.js",
            "pkg": {
              "assets": ["node_modules/**/*", "dist/**/*"],
              "targets": ["node20-win-${{ matrix.arch }}"]
            }
          }' > pkg.json

      - name: Install fixed pkg
        run: npm install -g @yao-pkg/pkg@latest

      # 正确打包！！！
      - name: Build EXE
        working-directory: picgo
        run: pkg pkg.json -o picgo-${{ matrix.arch }}.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: picgo-windows-${{ matrix.arch }}
          path: picgo/picgo-${{ matrix.arch }}.exe
