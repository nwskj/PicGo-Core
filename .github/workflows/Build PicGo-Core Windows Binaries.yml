name: 自动编译 PicList Win x64+x86
on:
  workflow_dispatch:    # 手动触发
  push:
    branches: [master]  # 提交自动编译
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自动拉取最新代码编译

jobs:
  build:
    name: 构建 Win ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]

    steps:
      # 已改为：PicList-Core 仓库
      - name: 拉取 PicList 最新代码
        uses: actions/checkout@v4
        with:
          repository: Kuingsmile/PicList-Core
          ref: master
          path: piclist

      - name: 使用 Node.js 20.19.0
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          architecture: ${{ matrix.arch }}

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        working-directory: piclist
        run: pnpm install --ignore-engines

      - name: 编译项目
        working-directory: piclist
        run: pnpm run build

      - name: 创建打包配置
        working-directory: piclist
        run: |
          echo '{
            "main": "./dist/index.cjs.js",
            "bin": "./dist/index.cjs.js",
            "pkg": {
              "assets": ["node_modules/**/*", "dist/**/*"]
            }
          }' > package-pkg.json

      - name: 安装打包工具
        run: npm install -g @yao-pkg/pkg@latest --force

      - name: 打包 EXE
        working-directory: piclist
        run: pkg package-pkg.json --targets node20-win-${{ matrix.arch }} -o piclist-${{ matrix.arch }}.exe

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: piclist-windows-${{ matrix.arch }}
          path: piclist/piclist-${{ matrix.arch }}.exe
