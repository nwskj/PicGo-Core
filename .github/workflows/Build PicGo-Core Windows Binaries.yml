name: Windows Auto Build
on:
  schedule:
    - cron: '0 0 */20 * *'  # 每20天自动编译
  workflow_dispatch:        # 可手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Build PicList-Core
        run: npm run build

      - name: Test
        run: node ./bin/picgo -v
